version: '3.8'

networks:
  fabric_network:

services:

  # =========================
  # ORDERER
  # =========================
  orderer.example.com:
    container_name: orderer.example.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/genesis.block
    working_dir: /root
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/genesis.block
      - ./organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls:/var/hyperledger/orderer/tls
    ports:
      - "7050:7050"
    networks:
      - fabric_network

  # =========================
  # COUCHDB ORG1
  # =========================
  couchdb0:
    container_name: couchdb0
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - fabric_network

  # =========================
  # PEER ORG1 (BEACUKAI)
  # =========================
  peer0.beacukai.example.com:
    container_name: peer0.beacukai.example.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.beacukai.example.com
      - CORE_PEER_ADDRESS=peer0.beacukai.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.beacukai.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.beacukai.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.beacukai.example.com:7051
      - CORE_PEER_LOCALMSPID=BeaCukaiMSP
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=network_fabric_network
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./organizations/peerOrganizations/beacukai.example.com/peers/peer0.beacukai.example.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/beacukai.example.com/peers/peer0.beacukai.example.com/tls:/etc/hyperledger/fabric/tls
    working_dir: /root
    command: peer node start
    ports:
      - "7051:7051"
    depends_on:
      - couchdb0
    networks:
      - fabric_network

  # =========================
  # COUCHDB ORG2
  # =========================
  couchdb1:
    container_name: couchdb1
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    networks:
      - fabric_network

  # =========================
  # PEER ORG2 (LOGISTIK)
  # =========================
  peer0.logistik.example.com:
    container_name: peer0.logistik.example.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.logistik.example.com
      - CORE_PEER_ADDRESS=peer0.logistik.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.logistik.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.logistik.example.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.logistik.example.com:9051
      - CORE_PEER_LOCALMSPID=LogistikMSP
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=network_fabric_network
      # CouchDB
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./organizations/peerOrganizations/logistik.example.com/peers/peer0.logistik.example.com/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/logistik.example.com/peers/peer0.logistik.example.com/tls:/etc/hyperledger/fabric/tls
    working_dir: /root
    command: peer node start
    ports:
      - "9051:9051"
    depends_on:
      - couchdb1
    networks:
      - fabric_network